<svg width="200" height="200" viewBox="0 0 200 200"
     xmlns="http://www.w3.org/2000/svg">

  <image href="../graphics/spinning_coin.png" x="50" y="50" width="100" height="100">
    <animateTransform attributeName="transform"
      type="translate"
      values="0,0; 0,-10; 0,0"
      dur="3s"
      repeatCount="indefinite"/>
      
    <animateTransform attributeName="transform"
      type="rotate"
      from="0 100 100"
      to="360 100 100"
      dur="4s"
      repeatCount="indefinite"
      additive="sum"/>
  </image>

</svg>
