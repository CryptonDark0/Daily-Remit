<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Remit Coin (DRC)</title>

<link rel="stylesheet" href="styles.css">
<link rel="icon" href="assets/logo/drc_icon_128.png">

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Ethers -->
<script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>
</head>

<body>

<!-- NAVBAR -->
<header class="nav-container">
  <div class="nav-inner">
    <div class="logo-group">
      <img src="assets/logo/drc_icon_64.png" alt="DRC Logo">
      <span class="nav-title">DRC</span>
    </div>
    <nav class="nav-links">
      <a href="#features">Features</a>
      <a href="#price-section">Live Price</a>
      <a href="#chart">Chart</a>
    </nav>
    <button id="connectWalletBtn">Connect Wallet</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Daily Remit Coin</h1>
  <p class="subtitle">Fast • Secure • Future‑Ready Crypto Ecosystem</p>

  <div class="hero-buttons">
    <button onclick="buyDRC()">Buy DRC</button>
  </div>

  <div class="coin-container">
    <div class="coin"></div>
  </div>
</section>

<!-- LIVE PRICE -->
<section id="price-section" class="price-section">
  <h2>Live BNB Price</h2>
  <p id="price" class="price-text"></p>
</section>

<!-- FEATURES -->
<section id="features" class="features">
  <h2>Key Features</h2>
  <div class="grid">
    <div class="card">🔥 Deflationary Supply</div>
    <div class="card">💰 Staking Rewards</div>
    <div class="card">🌐 Cross‑Chain Ready</div>
    <div class="card">🔐 Secure & Audited</div>
    <div class="card">🎨 NFT & DeFi Suite</div>
    <div class="card">🏛️ Governance DAO</div>
  </div>
</section>

<!-- LIVE CHART -->
<section id="chart" class="chart">
  <h2>Market Chart</h2>
  <iframe 
    src="https://www.geckoterminal.com/bsc/pools"
    width="100%" 
    height="400">
  </iframe>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Daily Remit Coin</p>
</footer>

<script src="script.js"></script>
</body>
</html>
