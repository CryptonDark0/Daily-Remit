<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyRemit</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#020617;
  color:white;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  position:fixed;
  width:100%;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

.nav a {color:#aaa;margin:0 10px;text-decoration:none;}

/* HERO */
.hero {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1639762681057-408e52192e55') center/cover;
  position:relative;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
}

.hero-content {
  position:relative;
  z-index:2;
}

.hero img {
  width:180px;
  animation:float 4s infinite;
}

@keyframes float {
  0%,100%{transform:translateY(0);} 
  50%{transform:translateY(-15px);} 
}

.hero h1 {font-size:3rem;}
.hero p {color:#ccc;}

.btn {
  padding:12px 25px;
  border:none;
  border-radius:8px;
  margin:10px;
  cursor:pointer;
}

.primary {background:gold;color:black;}
.secondary {background:transparent;border:1px solid gold;color:white;}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:40px;
  margin-top:-80px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
}

/* ABOUT */
.about {
  display:flex;
  flex-wrap:wrap;
  padding:80px 40px;
  gap:40px;
}

.about img {width:300px;}

/* FOOTER */
footer {
  text-align:center;
  padding:30px;
  color:#777;
}
</style>

</head>
<body>

<div class="nav">
  <div>DRC</div>
  <div>
    <a href="#">Market</a>
    <a href="#">Wallet</a>
    <a href="#">Docs</a>
  </div>
</div>

<section class="hero">
  <div class="hero-content">
    <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png">
    <h1>Welcome to DailyRemit</h1>
    <p>Send and trade cryptocurrency with ease</p>
    <button class="btn primary">Get Started</button>
    <button class="btn secondary">Learn More</button>
  </div>
</section>

<section class="cards">
  <div class="card">Trade Crypto</div>
  <div class="card">Remit Funds</div>
  <div class="card">Earn Rewards</div>
  <div class="card">Secure Wallet</div>
</section>

<section class="about">
  <div>
    <h2>What is DailyRemit?</h2>
    <p>Modern crypto platform for trading and remittance.</p>
  </div>
  <img src="https://cdn-icons-png.flaticon.com/512/825/825454.png">
</section>

<footer>
  <p>© 2026 DailyRemit</p>
</footer>

</body>
</html>
